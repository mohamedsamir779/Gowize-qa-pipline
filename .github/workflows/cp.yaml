name: CI/CD - Build and Deploy Client portal
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]         
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.8.0
          cache: 'npm'
          cache-dependency-path: client-portal-starter/

      - name: 📦 Install dependencies
        working-directory: ./client-portal-starter
        run: npm i --legacy-peer-deps

      - name: 🏗 Build app for production (ignore CI warnings)
        working-directory: ./client-portal-starter
        run: CI=false npm run build

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-folder
          path: client-portal-starter/build

  deploy:
    name: 🚀 Deploy to Production Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Download built files
        uses: actions/download-artifact@v4
        with:
          name: build-folder
          path: ./build

      # ✅ الخطوة الأولى: رفع الملفات إلى السيرفر
      - name: 📤 Upload build to server via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ./build/*
          target: /home/ubuntu/Gowize-qa-pipline/client-portal-starter/build

      # ✅ الخطوة الثانية: تشغيل أوامر على السيرفر (اختياري)
      - name: 🖥️ Restart Nginx service
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/Gowize-qa-pipline/client-portal-starter
            sudo systemctl restart nginx
